[pytest]
minversion = 7.0

# -------------------------------------------------
# Ensure project root is the ONLY import root
# -------------------------------------------------
pythonpath = .

# -------------------------------------------------
# Let pytest discover tests recursively
# (do NOT force multiple roots)
# -------------------------------------------------
testpaths = tests core/tests

# -------------------------------------------------
# Use importlib mode to avoid path-based shadowing
# -------------------------------------------------
addopts =
    --import-mode=importlib
    -ra

# -------------------------------------------------
# Silence irrelevant warnings
# -------------------------------------------------
filterwarnings =
    ignore::Warning
