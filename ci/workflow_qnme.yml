## `ci/workflow_qnme.yml`
Path: `ci/workflow_qnme.yml`
```yaml
# ci/workflow_qnme.yml
name: QNME CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest
      - name: Run tests
        run: |
          pytest -q
