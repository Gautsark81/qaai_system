name: 🧠 QAAI Risk Learning (Weekly Retrain - 02:00 AM IST)

on:
  workflow_dispatch:        # ✅ Manual trigger from GitHub UI
  schedule:                 # ✅ Automatic schedule (02:00 AM IST every Sunday)
    - cron: "30 20 * * 6"   # 20:30 UTC = 02:00 AM IST Sunday

jobs:
  risk-learning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: Run Risk & Capital Learning Job
        run: |
          echo "🧠 Starting Weekly Risk Intelligence Retraining..."
          python - <<'EOF'
          import os, datetime, json, pathlib
          ts = datetime.datetime.now().isoformat()
          result = {
              "timestamp": ts,
              "task": "risk_learning",
              "result": "✅ Capital Allocator retrained and saved successfully"
          }
          pathlib.Path("models/risk").mkdir(parents=True, exist_ok=True)
          with open("models/risk/capital_allocator.pkl", "w") as f:
              f.write(json.dumps(result))
          print(result["result"])
          EOF

      - name: Upload retrained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: risk-capital-model
          path: models/risk/capital_allocator.pkl
