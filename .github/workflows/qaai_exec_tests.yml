name: 🧠 QAAI Execution Intelligence Tests

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  test:
    name: Run Unit Tests (Execution Intelligence)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pytest-asyncio optuna colorlog tqdm numpy sqlalchemy pyyaml alembic

      - name: ✅ Run Execution Intelligence Tests
        run: |
          pytest -q tests/test_execution_intelligence.py --maxfail=1 --disable-warnings -v

      - name: 📊 Archive test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qaai-execution-intel-logs
          path: .pytest_cache
