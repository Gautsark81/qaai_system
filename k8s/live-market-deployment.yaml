apiVersion: apps/v1
kind: Deployment
metadata:
  name: live-market
  namespace: qaai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: live-market
  template:
    metadata:
      labels:
        app: live-market
    spec:
      containers:
        - name: live-market
          image: your-registry/qaai-live-market:latest
          imagePullPolicy: Always
          command: ["python", "services/live_market_runner.py"]
          env:
            - name: DHAN_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: dhan-secrets
                  key: DHAN_CLIENT_ID
            - name: DHAN_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dhan-secrets
                  key: DHAN_ACCESS_TOKEN
            - name: REDIS_URL
              value: "redis://redis:6379"
      # Add resource requests/limits in production
