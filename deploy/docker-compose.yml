version: "3.8"
services:
  live_market:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 700M
    ports:
      - "${HEALTH_PORT:-8000}:8000"
